<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 300px;
        padding: 16px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #111116;
        color: #eee;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
      }
      .title {
        font-size: 17px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      label {
        display: block;
        font-size: 11px;
        color: #aaa;
        margin: 12px 0 4px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        border-radius: 7px;
        border: 1px solid #2a2a33;
        background: #18181f;
        color: #eee;
        font-size: 13px;
      }
      button {
        margin-top: 14px;
        width: 100%;
        padding: 9px;
        border: 0;
        border-radius: 7px;
        background: #e9b44c;
        color: #111;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
      }
      .status {
        margin-top: 12px;
        font-size: 12px;
        color: #888;
        text-align: center;
        min-height: 16px;
      }
      .status.ok {
        color: #5fd9c2;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <svg width="24" height="20" viewBox="0 0 36 28">
        <line x1="6" y1="21" x2="14" y2="8" stroke="#e9b44c" stroke-width="2" />
        <line x1="14" y1="8" x2="24" y2="15" stroke="#e9b44c" stroke-width="2" />
        <line x1="24" y1="15" x2="31" y2="6" stroke="#e9b44c" stroke-width="2" />
        <circle cx="31" cy="6" r="4" fill="#e9b44c" />
      </svg>
      <div class="title">Warren Live</div>
    </div>

    <label for="url">Warren app URL</label>
    <input id="url" type="url" placeholder="http://localhost:3000" />
    <label for="token">Extension token</label>
    <input id="token" type="password" placeholder="paste WARREN_EXTENSION_TOKEN" />
    <button id="save">Save &amp; connect</button>
    <div class="status" id="status"></div>

    <script src="popup.js"></script>
  </body>
</html>
